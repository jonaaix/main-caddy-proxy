services:
    my-app:
        image: your-app-image
        networks:
            - main-proxy
        labels:
            # Canonical domain (non-www)
            caddy_0: example.com
            # Reverse proxy to this container's port 9000
            caddy_0.reverse_proxy: "{{upstreams 9000}}"
            # Enable gzip and zstd compression
            caddy_0.encode: zstd gzip

            # Include www domain
            caddy_1: www.example.com
            # Redirect www to non-www with HTTPS
            caddy_1.redir: https://example.com{uri}
